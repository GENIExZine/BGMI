<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Login — AYLINBOOS</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%91%91%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand"><span class="dot">◆</span>AYLINBOOS</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="accounts.html" class="nav-link">Accounts</a>
      <a href="rank-push.html" class="nav-link">Rank Push</a>
      <a href="popularity.html" class="nav-link">Popularity</a>
      <a href="https://t.me/aylinboss" target="_blank" rel="noopener" class="btn btn-primary nav-cta">Contact</a>
    </div>
    <button class="nav-toggle" aria-label="Toggle menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
  </div>
</nav>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">
      <div class="nav-brand" style="justify-content:center;"><span class="dot">◆</span>AYLINBOOS</div>
      <div class="tag">Owner Access</div>
    </div>

    <div class="login-step active" id="login-step-1">
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="login-username">Username</label>
          <input class="form-input" id="login-username" type="text" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input class="form-input" id="login-password" type="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Continue</button>
      </form>
    </div>

    <div class="login-step" id="login-step-2">
      <form id="otp-form">
        <div class="form-group">
          <label class="form-label" for="login-otp">6-digit code</label>
          <input class="form-input mono" id="login-otp" type="text" inputmode="numeric" maxlength="6" autocomplete="one-time-code" placeholder="000000">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Verify & Sign In</button>
      </form>
    </div>

    <div class="form-msg" id="login-msg"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
</body>
</html>
